name: paper-bloom
label: Paper Bloom
description: Warm ivory and blush with extra readability
layoutVariant: cockpit

colors:
  background: "#fbf7f2"
  foreground: "#22262c"
  card: "#fffdf9"
  card-foreground: "#22262c"
  popover: "#ffffff"
  popover-foreground: "#22262c"
  primary: "#8f7cff"
  primary-foreground: "#ffffff"
  secondary: "#e8ddd2"
  secondary-foreground: "#34383f"
  muted: "#f2ebe4"
  muted-foreground: "#6e747c"
  accent: "#f2b7c8"
  accent-foreground: "#3b2330"
  destructive: "#d96c78"
  destructive-foreground: "#ffffff"
  success: "#71b894"
  warning: "#d3a35a"
  border: "#e7ddd4"
  input: "#efe6de"
  ring: "#8f7cff"

palette:
  background: "#fbf7f2"
  midground: "#f2b7c8"
  foreground: "#22262c"
  warmGlow: "#f0d7e0"
  noiseOpacity: 0.12

overlay:
  noiseOpacity: 0.12
  noiseBlendMode: soft-light
  warmGlowOpacity: 0.08
  warmGlowColor: "rgba(242, 183, 200, 0.18)"

typography:
  fontSans: '"Manrope", "Avenir Next", "Segoe UI", system-ui, sans-serif'
  fontMono: '"IBM Plex Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace'
  fontDisplay: '"Manrope", "Avenir Next", "Segoe UI", system-ui, sans-serif'
  fontUrl: "https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
  baseSize: "15px"
  lineHeight: "1.65"
  letterSpacing: "0.01em"

layout:
  radius: "1rem"
  density: comfortable

componentStyles:
  card:
    clipPath: "polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px)"
    background: "linear-gradient(180deg, rgba(255, 253, 249, 0.96), rgba(247, 241, 235, 0.9))"
    boxShadow: "inset 0 0 0 1px rgba(143, 124, 255, 0.10), 0 18px 36px rgba(73, 55, 86, 0.10)"
    backdropFilter: "blur(10px)"
  header:
    background: "linear-gradient(180deg, rgba(255, 252, 248, 0.98), rgba(245, 238, 231, 0.94))"
    boxShadow: "inset 0 -1px 0 rgba(143, 124, 255, 0.10)"
  footer:
    background: "linear-gradient(180deg, rgba(245, 238, 231, 0.94), rgba(255, 252, 248, 0.98))"
  sidebar:
    background: "linear-gradient(180deg, rgba(251, 246, 240, 0.98), rgba(247, 239, 231, 0.96))"
    boxShadow: "inset -1px 0 0 rgba(143, 124, 255, 0.10)"
  tab:
    clipPath: "polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%)"
    background: "linear-gradient(180deg, rgba(255, 250, 245, 0.98), rgba(241, 232, 224, 0.94))"
  badge:
    boxShadow: "inset 0 0 0 1px rgba(143, 124, 255, 0.16)"
  backdrop:
    background: "radial-gradient(circle at top left, rgba(143, 124, 255, 0.12), transparent 36%), radial-gradient(circle at bottom right, rgba(242, 183, 200, 0.18), transparent 34%), linear-gradient(180deg, rgba(251, 247, 242, 1), rgba(246, 240, 234, 1))"
  page:
    background: "linear-gradient(180deg, rgba(251, 247, 242, 0.98), rgba(246, 240, 234, 1))"

colorOverrides:
  card: "#fffdf9"
  cardForeground: "#22262c"
  popover: "#ffffff"
  popoverForeground: "#22262c"
  primary: "#8f7cff"
  primaryForeground: "#ffffff"
  secondary: "#e8ddd2"
  secondaryForeground: "#34383f"
  muted: "#f2ebe4"
  mutedForeground: "#6e747c"
  accent: "#f2b7c8"
  accentForeground: "#3b2330"
  destructive: "#d96c78"
  destructiveForeground: "#ffffff"
  success: "#71b894"
  warning: "#d3a35a"
  border: "#e7ddd4"
  input: "#efe6de"
  ring: "#8f7cff"

customCSS: |
  :root[data-layout-variant="cockpit"] {
    color-scheme: light;
  }

  :root[data-layout-variant="cockpit"] body {
    background:
      radial-gradient(circle at 18% 8%, rgba(143, 124, 255, 0.10), transparent 24%),
      radial-gradient(circle at 82% 0%, rgba(242, 183, 200, 0.14), transparent 28%),
      linear-gradient(180deg, #fbf7f2 0%, #f5efe8 100%);
  }

  :root[data-layout-variant="cockpit"] body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    background:
      linear-gradient(to bottom, rgba(255, 255, 255, 0.36), rgba(255, 255, 255, 0)),
      repeating-linear-gradient(
        to bottom,
        rgba(143, 124, 255, 0) 0,
        rgba(143, 124, 255, 0) 4px,
        rgba(143, 124, 255, 0.03) 5px,
        rgba(143, 124, 255, 0) 6px
      );
    opacity: 0.35;
    mix-blend-mode: soft-light;
  }

  :root[data-layout-variant="cockpit"] ::selection {
    background: rgba(143, 124, 255, 0.20);
    color: #22262c;
  }

  :root[data-layout-variant="cockpit"] a {
    text-decoration-thickness: 0.08em;
    text-underline-offset: 0.16em;
  }