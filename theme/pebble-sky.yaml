name: pebble-sky
label: Pebble Sky
description: Cool stone and powder blue with crisp contrast
layoutVariant: cockpit

colors:
  background: "#f2f6fa"
  foreground: "#1f2730"
  card: "#fbfdff"
  card-foreground: "#1f2730"
  popover: "#ffffff"
  popover-foreground: "#1f2730"
  primary: "#78aee8"
  primary-foreground: "#ffffff"
  secondary: "#dde6ee"
  secondary-foreground: "#2c3640"
  muted: "#ecf2f6"
  muted-foreground: "#66717d"
  accent: "#c2d8ef"
  accent-foreground: "#2c3640"
  destructive: "#d8747d"
  destructive-foreground: "#ffffff"
  success: "#76bfa0"
  warning: "#cba661"
  border: "#d7e1ea"
  input: "#e3ebf2"
  ring: "#78aee8"

palette:
  background: "#f2f6fa"
  midground: "#c2d8ef"
  foreground: "#1f2730"
  warmGlow: "#dce8f6"
  noiseOpacity: 0.10

overlay:
  noiseOpacity: 0.10
  noiseBlendMode: soft-light
  warmGlowOpacity: 0.07
  warmGlowColor: "rgba(194, 216, 239, 0.18)"

typography:
  fontSans: '"Manrope", "Avenir Next", "Segoe UI", system-ui, sans-serif'
  fontMono: '"IBM Plex Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace'
  fontDisplay: '"Manrope", "Avenir Next", "Segoe UI", system-ui, sans-serif'
  fontUrl: "https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
  baseSize: "15px"
  lineHeight: "1.65"
  letterSpacing: "0.008em"

layout:
  radius: "1rem"
  density: comfortable

componentStyles:
  card:
    clipPath: "polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px)"
    background: "linear-gradient(180deg, rgba(251, 253, 255, 0.98), rgba(241, 246, 251, 0.92))"
    boxShadow: "inset 0 0 0 1px rgba(120, 174, 232, 0.10), 0 18px 36px rgba(52, 66, 80, 0.10)"
    backdropFilter: "blur(10px)"
  header:
    background: "linear-gradient(180deg, rgba(251, 253, 255, 0.98), rgba(236, 242, 248, 0.94))"
    boxShadow: "inset 0 -1px 0 rgba(120, 174, 232, 0.10)"
  footer:
    background: "linear-gradient(180deg, rgba(236, 242, 248, 0.94), rgba(251, 253, 255, 0.98))"
  sidebar:
    background: "linear-gradient(180deg, rgba(245, 249, 252, 0.98), rgba(236, 242, 247, 0.96))"
    boxShadow: "inset -1px 0 0 rgba(120, 174, 232, 0.10)"
  tab:
    clipPath: "polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%)"
    background: "linear-gradient(180deg, rgba(251, 253, 255, 0.98), rgba(234, 241, 247, 0.94))"
  badge:
    boxShadow: "inset 0 0 0 1px rgba(120, 174, 232, 0.16)"
  backdrop:
    background: "radial-gradient(circle at top left, rgba(120, 174, 232, 0.12), transparent 36%), radial-gradient(circle at bottom right, rgba(194, 216, 239, 0.16), transparent 34%), linear-gradient(180deg, rgba(242, 246, 250, 1), rgba(236, 242, 247, 1))"
  page:
    background: "linear-gradient(180deg, rgba(242, 246, 250, 0.98), rgba(236, 242, 247, 1))"

colorOverrides:
  card: "#fbfdff"
  cardForeground: "#1f2730"
  popover: "#ffffff"
  popoverForeground: "#1f2730"
  primary: "#78aee8"
  primaryForeground: "#ffffff"
  secondary: "#dde6ee"
  secondaryForeground: "#2c3640"
  muted: "#ecf2f6"
  mutedForeground: "#66717d"
  accent: "#c2d8ef"
  accentForeground: "#2c3640"
  destructive: "#d8747d"
  destructiveForeground: "#ffffff"
  success: "#76bfa0"
  warning: "#cba661"
  border: "#d7e1ea"
  input: "#e3ebf2"
  ring: "#78aee8"

customCSS: |
  :root[data-layout-variant="cockpit"] {
    color-scheme: light;
  }

  :root[data-layout-variant="cockpit"] body {
    background:
      radial-gradient(circle at 18% 8%, rgba(120, 174, 232, 0.10), transparent 24%),
      radial-gradient(circle at 82% 0%, rgba(194, 216, 239, 0.15), transparent 28%),
      linear-gradient(180deg, #f2f6fa 0%, #ebf1f6 100%);
  }

  :root[data-layout-variant="cockpit"] body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    background:
      linear-gradient(to bottom, rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0)),
      repeating-linear-gradient(
        to bottom,
        rgba(120, 174, 232, 0) 0,
        rgba(120, 174, 232, 0) 4px,
        rgba(120, 174, 232, 0.03) 5px,
        rgba(120, 174, 232, 0) 6px
      );
    opacity: 0.32;
    mix-blend-mode: soft-light;
  }

  :root[data-layout-variant="cockpit"] ::selection {
    background: rgba(120, 174, 232, 0.20);
    color: #1f2730;
  }

  :root[data-layout-variant="cockpit"] a {
    text-decoration-thickness: 0.08em;
    text-underline-offset: 0.16em;
  }