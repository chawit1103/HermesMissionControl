name: butter-petal
label: Butter Petal
description: Buttercream and peach with a friendly airy look
layoutVariant: cockpit

colors:
  background: "#fff8ee"
  foreground: "#27231f"
  card: "#fffdf8"
  card-foreground: "#27231f"
  popover: "#ffffff"
  popover-foreground: "#27231f"
  primary: "#f0a766"
  primary-foreground: "#ffffff"
  secondary: "#f0e1cf"
  secondary-foreground: "#372f28"
  muted: "#f8f0e4"
  muted-foreground: "#7a6d61"
  accent: "#f7cfa5"
  accent-foreground: "#372f28"
  destructive: "#d6726f"
  destructive-foreground: "#ffffff"
  success: "#79b893"
  warning: "#cfa359"
  border: "#eadcc8"
  input: "#f2e5d6"
  ring: "#f0a766"

palette:
  background: "#fff8ee"
  midground: "#f7cfa5"
  foreground: "#27231f"
  warmGlow: "#fde7c9"
  noiseOpacity: 0.10

overlay:
  noiseOpacity: 0.10
  noiseBlendMode: soft-light
  warmGlowOpacity: 0.08
  warmGlowColor: "rgba(247, 207, 165, 0.18)"

typography:
  fontSans: '"Manrope", "Avenir Next", "Segoe UI", system-ui, sans-serif'
  fontMono: '"IBM Plex Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace'
  fontDisplay: '"Manrope", "Avenir Next", "Segoe UI", system-ui, sans-serif'
  fontUrl: "https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
  baseSize: "15px"
  lineHeight: "1.65"
  letterSpacing: "0.008em"

layout:
  radius: "1rem"
  density: comfortable

componentStyles:
  card:
    clipPath: "polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px)"
    background: "linear-gradient(180deg, rgba(255, 253, 248, 0.98), rgba(250, 242, 230, 0.92))"
    boxShadow: "inset 0 0 0 1px rgba(240, 167, 102, 0.10), 0 18px 36px rgba(95, 73, 50, 0.10)"
    backdropFilter: "blur(10px)"
  header:
    background: "linear-gradient(180deg, rgba(255, 252, 247, 0.98), rgba(245, 236, 221, 0.94))"
    boxShadow: "inset 0 -1px 0 rgba(240, 167, 102, 0.10)"
  footer:
    background: "linear-gradient(180deg, rgba(245, 236, 221, 0.94), rgba(255, 252, 247, 0.98))"
  sidebar:
    background: "linear-gradient(180deg, rgba(255, 249, 241, 0.98), rgba(247, 237, 225, 0.96))"
    boxShadow: "inset -1px 0 0 rgba(240, 167, 102, 0.10)"
  tab:
    clipPath: "polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%)"
    background: "linear-gradient(180deg, rgba(255, 252, 247, 0.98), rgba(244, 232, 215, 0.94))"
  badge:
    boxShadow: "inset 0 0 0 1px rgba(240, 167, 102, 0.16)"
  backdrop:
    background: "radial-gradient(circle at top left, rgba(240, 167, 102, 0.10), transparent 36%), radial-gradient(circle at bottom right, rgba(247, 207, 165, 0.16), transparent 34%), linear-gradient(180deg, rgba(255, 248, 238, 1), rgba(250, 239, 224, 1))"
  page:
    background: "linear-gradient(180deg, rgba(255, 248, 238, 0.98), rgba(250, 239, 224, 1))"

colorOverrides:
  card: "#fffdf8"
  cardForeground: "#27231f"
  popover: "#ffffff"
  popoverForeground: "#27231f"
  primary: "#f0a766"
  primaryForeground: "#ffffff"
  secondary: "#f0e1cf"
  secondaryForeground: "#372f28"
  muted: "#f8f0e4"
  mutedForeground: "#7a6d61"
  accent: "#f7cfa5"
  accentForeground: "#372f28"
  destructive: "#d6726f"
  destructiveForeground: "#ffffff"
  success: "#79b893"
  warning: "#cfa359"
  border: "#eadcc8"
  input: "#f2e5d6"
  ring: "#f0a766"

customCSS: |
  :root[data-layout-variant="cockpit"] {
    color-scheme: light;
  }

  :root[data-layout-variant="cockpit"] body {
    background:
      radial-gradient(circle at 18% 8%, rgba(240, 167, 102, 0.10), transparent 24%),
      radial-gradient(circle at 82% 0%, rgba(247, 207, 165, 0.15), transparent 28%),
      linear-gradient(180deg, #fff8ee 0%, #fdf0de 100%);
  }

  :root[data-layout-variant="cockpit"] body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    background:
      linear-gradient(to bottom, rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0)),
      repeating-linear-gradient(
        to bottom,
        rgba(240, 167, 102, 0) 0,
        rgba(240, 167, 102, 0) 4px,
        rgba(240, 167, 102, 0.03) 5px,
        rgba(240, 167, 102, 0) 6px
      );
    opacity: 0.30;
    mix-blend-mode: soft-light;
  }

  :root[data-layout-variant="cockpit"] ::selection {
    background: rgba(240, 167, 102, 0.20);
    color: #27231f;
  }

  :root[data-layout-variant="cockpit"] a {
    text-decoration-thickness: 0.08em;
    text-underline-offset: 0.16em;
  }