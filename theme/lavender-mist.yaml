name: lavender-mist
label: Lavender Mist
description: Pale lilac and fog with a gentle minimal tone
layoutVariant: cockpit

colors:
  background: "#f5f2fb"
  foreground: "#25212f"
  card: "#fcfbff"
  card-foreground: "#25212f"
  popover: "#ffffff"
  popover-foreground: "#25212f"
  primary: "#9b86ee"
  primary-foreground: "#ffffff"
  secondary: "#e4def3"
  secondary-foreground: "#342f43"
  muted: "#f0ebf8"
  muted-foreground: "#726d80"
  accent: "#d9cdf7"
  accent-foreground: "#342f43"
  destructive: "#d47084"
  destructive-foreground: "#ffffff"
  success: "#77b89f"
  warning: "#c7a160"
  border: "#ddd5ea"
  input: "#e9e2f3"
  ring: "#9b86ee"

palette:
  background: "#f5f2fb"
  midground: "#d9cdf7"
  foreground: "#25212f"
  warmGlow: "#eadff9"
  noiseOpacity: 0.10

overlay:
  noiseOpacity: 0.10
  noiseBlendMode: soft-light
  warmGlowOpacity: 0.08
  warmGlowColor: "rgba(217, 205, 247, 0.18)"

typography:
  fontSans: '"Manrope", "Avenir Next", "Segoe UI", system-ui, sans-serif'
  fontMono: '"IBM Plex Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace'
  fontDisplay: '"Manrope", "Avenir Next", "Segoe UI", system-ui, sans-serif'
  fontUrl: "https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
  baseSize: "15px"
  lineHeight: "1.65"
  letterSpacing: "0.008em"

layout:
  radius: "1rem"
  density: comfortable

componentStyles:
  card:
    clipPath: "polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px)"
    background: "linear-gradient(180deg, rgba(252, 251, 255, 0.98), rgba(243, 238, 250, 0.92))"
    boxShadow: "inset 0 0 0 1px rgba(155, 134, 238, 0.10), 0 18px 36px rgba(70, 59, 92, 0.10)"
    backdropFilter: "blur(10px)"
  header:
    background: "linear-gradient(180deg, rgba(252, 251, 255, 0.98), rgba(239, 233, 247, 0.94))"
    boxShadow: "inset 0 -1px 0 rgba(155, 134, 238, 0.10)"
  footer:
    background: "linear-gradient(180deg, rgba(239, 233, 247, 0.94), rgba(252, 251, 255, 0.98))"
  sidebar:
    background: "linear-gradient(180deg, rgba(246, 241, 251, 0.98), rgba(239, 232, 247, 0.96))"
    boxShadow: "inset -1px 0 0 rgba(155, 134, 238, 0.10)"
  tab:
    clipPath: "polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%)"
    background: "linear-gradient(180deg, rgba(252, 251, 255, 0.98), rgba(237, 230, 247, 0.94))"
  badge:
    boxShadow: "inset 0 0 0 1px rgba(155, 134, 238, 0.16)"
  backdrop:
    background: "radial-gradient(circle at top left, rgba(155, 134, 238, 0.12), transparent 36%), radial-gradient(circle at bottom right, rgba(217, 205, 247, 0.16), transparent 34%), linear-gradient(180deg, rgba(245, 242, 251, 1), rgba(239, 233, 247, 1))"
  page:
    background: "linear-gradient(180deg, rgba(245, 242, 251, 0.98), rgba(239, 233, 247, 1))"

colorOverrides:
  card: "#fcfbff"
  cardForeground: "#25212f"
  popover: "#ffffff"
  popoverForeground: "#25212f"
  primary: "#9b86ee"
  primaryForeground: "#ffffff"
  secondary: "#e4def3"
  secondaryForeground: "#342f43"
  muted: "#f0ebf8"
  mutedForeground: "#726d80"
  accent: "#d9cdf7"
  accentForeground: "#342f43"
  destructive: "#d47084"
  destructiveForeground: "#ffffff"
  success: "#77b89f"
  warning: "#c7a160"
  border: "#ddd5ea"
  input: "#e9e2f3"
  ring: "#9b86ee"

customCSS: |
  :root[data-layout-variant="cockpit"] {
    color-scheme: light;
  }

  :root[data-layout-variant="cockpit"] body {
    background:
      radial-gradient(circle at 18% 8%, rgba(155, 134, 238, 0.10), transparent 24%),
      radial-gradient(circle at 82% 0%, rgba(217, 205, 247, 0.15), transparent 28%),
      linear-gradient(180deg, #f5f2fb 0%, #efe8f8 100%);
  }

  :root[data-layout-variant="cockpit"] body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    background:
      linear-gradient(to bottom, rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0)),
      repeating-linear-gradient(
        to bottom,
        rgba(155, 134, 238, 0) 0,
        rgba(155, 134, 238, 0) 4px,
        rgba(155, 134, 238, 0.03) 5px,
        rgba(155, 134, 238, 0) 6px
      );
    opacity: 0.32;
    mix-blend-mode: soft-light;
  }

  :root[data-layout-variant="cockpit"] ::selection {
    background: rgba(155, 134, 238, 0.20);
    color: #25212f;
  }

  :root[data-layout-variant="cockpit"] a {
    text-decoration-thickness: 0.08em;
    text-underline-offset: 0.16em;
  }